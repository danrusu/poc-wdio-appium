name: Android Test

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  android-wdio:
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      APPIUM_HOST: 127.0.0.1
      APPIUM_PORT: 4723
      APPIUM_BASE_PATH: /wd/hub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install npm dependencies
        run: npm ci

      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run Android emulator, start Appium, and execute WDIO tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-boot-timeout: 900
          disable-animations: true
          script: |
            adb devices
            adb wait-for-device

            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0

            nohup appium \
              --address $APPIUM_HOST \
              --port $APPIUM_PORT \
              --base-path $APPIUM_BASE_PATH \
              --log ./appium.log \
              > ./appium.out 2>&1 &

            echo "Waiting for Appium to be ready..."
            for i in {1..30}; do
              if curl --silent --fail "http://$APPIUM_HOST:$APPIUM_PORT$APPIUM_BASE_PATH/status" > /dev/null; then
                echo "Appium is ready"
                break
              fi
              echo "Appium not ready yet, retrying..."
              sleep 2
            done

            curl --fail "http://$APPIUM_HOST:$APPIUM_PORT$APPIUM_BASE_PATH/status"

            npm run test:android

      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: |
            appium.log
            appium.out

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            screenshots
            reports
            allure-results
            logs
          if-no-files-found: ignore
